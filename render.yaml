services:
  - type: web
    name: dasha-moscow-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DASHA_PASSWORD
        sync: false
      - key: TEST_PASSWORD
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: START_DATE
        value: "2026-05-25"
      - key: UNLOCK_ALL_DAYS
        value: "false"
